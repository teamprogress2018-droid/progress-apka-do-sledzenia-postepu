
<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>PROGRESS · Twój postęp</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#0a0a0a;--surface:rgba(15,15,15,0.95);--surface2:rgba(22,22,22,0.98);
  --border:rgba(232,48,42,0.15);--border2:rgba(232,48,42,0.3);
  --text:#f2ede8;--muted:#666;--muted2:#444;
  --accent:#e8302a;--green:#4ade80;--red:#f87171;--blue:#60a5fa;--yellow:#f59e0b;--purple:#a78bfa;
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;overflow-x:hidden;}
input,select,textarea,button{font-family:'DM Sans',sans-serif;}

/* ── APP SHELL ── */
.app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;position:relative;}
.screen{display:none;flex-direction:column;height:100%;overflow:hidden;}
.screen.active{display:flex;}

/* ── LOGIN ── */
.login-bg{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:radial-gradient(ellipse at 50% 0%,rgba(232,48,42,0.12) 0%,transparent 70%);}
.login-logo{font-family:'Syne',sans-serif;font-size:42px;font-weight:800;color:var(--accent);letter-spacing:-1px;text-shadow:0 0 40px rgba(232,48,42,0.5);}
.login-sub{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:3px;text-transform:uppercase;margin-top:4px;margin-bottom:40px;}
.login-card{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:24px 20px;}
.login-tabs{display:flex;gap:8px;margin-bottom:20px;}
.ltab{flex:1;padding:9px;text-align:center;border-radius:8px;border:1px solid var(--border2);font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);transition:all 0.15s;background:transparent;}
.ltab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:5px;}
.fg input{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border2);border-radius:8px;padding:12px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color 0.15s;}
.fg input:focus{border-color:var(--accent);}
.ferr{font-size:11px;color:var(--red);text-align:center;min-height:16px;margin-bottom:8px;}
.btn-login{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;letter-spacing:0.3px;}
.btn-login:active{opacity:0.85;}

/* ── HEADER ── */
.hdr{padding:14px 18px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:rgba(6,6,6,0.98);backdrop-filter:blur(10px);}
.hdr-left{display:flex;align-items:center;gap:10px;}
.hdr-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:#fff;flex-shrink:0;}
.hdr-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--accent);}
.hdr-sub{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}
.hdr-btn{background:transparent;border:1px solid var(--border2);color:var(--muted);border-radius:7px;padding:6px 12px;font-size:11px;cursor:pointer;}

/* ── NAV ── */
.nav{display:flex;border-top:1px solid var(--border);flex-shrink:0;background:rgba(6,6,6,0.98);backdrop-filter:blur(10px);}
.nav-btn{flex:1;padding:10px 0 8px;background:none;border:none;color:var(--muted);font-size:8px;font-family:'DM Mono',monospace;cursor:pointer;transition:color 0.15s;display:flex;flex-direction:column;align-items:center;gap:3px;letter-spacing:0.5px;text-transform:uppercase;}
.nav-btn svg{width:18px;height:18px;stroke-width:1.5;stroke:currentColor;fill:none;}
.nav-btn.active{color:var(--accent);}

/* ── SCROLL ── */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{display:none;}

/* ── SECTION LABELS ── */
.sec-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;padding:16px 18px 8px;}

/* ── DASHBOARD ── */
.dash-hero{padding:18px;background:linear-gradient(135deg,rgba(232,48,42,0.08),transparent);border-bottom:1px solid var(--border);margin-bottom:2px;}
.dash-greeting{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:4px;}
.dash-name{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;line-height:1.1;margin-bottom:12px;}
.dash-streak-row{display:flex;align-items:center;gap:6px;}
.dash-streak-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.3);border-radius:99px;padding:5px 12px;font-size:12px;font-weight:700;color:var(--yellow);}
.dash-league{display:inline-flex;align-items:center;gap:5px;background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.25);border-radius:99px;padding:5px 12px;font-size:12px;font-weight:700;color:var(--blue);}

/* ── STAT GRID ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 18px;}
.stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;}
.stat-card.wide{grid-column:span 2;}
.stat-label{font-size:9px;font-family:'DM Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;}
.stat-val{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;line-height:1;}
.stat-unit{font-size:12px;color:var(--muted);font-weight:400;margin-left:2px;}
.stat-sub{font-size:10px;color:var(--muted);margin-top:4px;}
.stat-trend{font-size:11px;font-weight:600;margin-top:2px;}
.stat-trend.up{color:var(--green);}
.stat-trend.down{color:var(--red);}

/* ── LEVEL BAR ── */
.lv-wrap{padding:12px 18px;background:var(--surface2);border-bottom:1px solid var(--border);border-top:1px solid var(--border);}
.lv-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.lv-name{font-size:12px;font-weight:600;}
.lv-xp{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}
.lv-bg{height:6px;background:rgba(255,255,255,0.08);border-radius:99px;overflow:hidden;}
.lv-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),#ff6b6b);transition:width 0.6s;}

/* ── MOTIVATION QUOTE ── */
.motiv-card{margin:12px 18px;background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--radius);padding:14px 16px;cursor:pointer;}
.motiv-text{font-size:13px;color:var(--text);line-height:1.55;font-style:italic;}
.motiv-tap{font-size:9px;color:var(--muted);margin-top:6px;font-family:'DM Mono',monospace;}

/* ── TRAINER MESSAGE ── */
.trainer-msg{margin:0 18px 12px;background:rgba(96,165,250,0.08);border:1px solid rgba(96,165,250,0.2);border-radius:var(--radius);padding:14px 16px;}
.tm-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.tm-av{width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.tm-who{font-size:11px;color:var(--blue);font-weight:600;}
.tm-text{font-size:13px;color:var(--text);line-height:1.5;}
.tm-date{font-size:9px;color:var(--muted);margin-top:4px;font-family:'DM Mono',monospace;}

/* ── UPCOMING TRAINING ── */
.next-train{margin:0 18px 12px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:14px;}
.nt-icon{font-size:28px;flex-shrink:0;}
.nt-info{flex:1;}
.nt-label{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.5px;}
.nt-date{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-top:2px;}
.nt-karnet{font-size:11px;color:var(--muted);margin-top:2px;}
.nt-badge{font-size:10px;padding:3px 8px;border-radius:99px;font-family:'DM Mono',monospace;font-weight:600;flex-shrink:0;}
.nt-badge.ok{background:rgba(74,222,128,0.12);color:var(--green);}
.nt-badge.warn{background:rgba(245,158,11,0.12);color:var(--yellow);}
.nt-badge.empty{background:rgba(248,113,113,0.12);color:var(--red);}

/* ── HABITS ── */
.habit-phase{display:flex;align-items:center;gap:7px;padding:8px 18px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.habit-phase::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}
.habit-row{display:flex;align-items:center;padding:11px 18px;border-bottom:1px solid rgba(255,255,255,0.04);gap:12px;transition:background 0.15s;cursor:pointer;}
.habit-row:active{background:rgba(255,255,255,0.03);}
.habit-row.done{background:rgba(74,222,128,0.04);}
.hchk{width:26px;height:26px;border-radius:7px;border:2px solid var(--muted2);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:all 0.2s;}
.hchk.checked{background:var(--green);border-color:var(--green);color:#000;}
.habit-info{flex:1;min-width:0;}
.habit-name{font-size:13px;font-weight:500;}
.habit-row.done .habit-name{color:var(--muted);text-decoration:line-through;}
.habit-meta{font-size:10px;color:var(--muted);margin-top:2px;}
.habit-xp{font-size:11px;color:var(--yellow);font-weight:700;flex-shrink:0;}
.prog-bar-wrap{padding:0 18px 8px;}
.prog-bar-bg{height:4px;background:rgba(255,255,255,0.07);border-radius:99px;overflow:hidden;}
.prog-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--green),#22c55e);transition:width 0.4s;}
.prog-info{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;padding:4px 18px 0;}

/* ── CHALLENGE BANNER ── */
.ch-banner{margin:10px 18px;background:linear-gradient(135deg,rgba(245,158,11,0.1),rgba(232,48,42,0.08));border:1px solid rgba(245,158,11,0.25);border-radius:var(--radius);padding:14px 16px;}
.ch-tag{display:inline-flex;align-items:center;gap:4px;background:rgba(245,158,11,0.2);border-radius:99px;padding:2px 9px;font-size:9px;font-weight:700;color:var(--yellow);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
.ch-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:4px;}
.ch-desc{font-size:11px;color:var(--muted);margin-bottom:10px;}
.ch-foot{display:flex;align-items:center;justify-content:space-between;}
.ch-xp{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--yellow);}
.ch-btn{padding:9px 18px;background:var(--yellow);color:#000;border:none;border-radius:8px;font-size:12px;font-weight:800;cursor:pointer;font-family:'DM Sans',sans-serif;}
.ch-btn.done{background:rgba(74,222,128,0.2);color:var(--green);border:1px solid rgba(74,222,128,0.3);}
.ch-who{font-size:10px;color:var(--muted);margin-top:7px;}

/* ── MEASUREMENTS ── */
.measure-hero{padding:16px 18px;border-bottom:1px solid var(--border);}
.measure-current{display:flex;align-items:baseline;gap:6px;}
.measure-big{font-family:'Syne',sans-serif;font-size:52px;font-weight:800;line-height:1;color:var(--text);}
.measure-unit{font-size:18px;color:var(--muted);}
.measure-change{font-size:13px;font-weight:600;padding:3px 10px;border-radius:99px;}
.measure-change.positive{background:rgba(74,222,128,0.12);color:var(--green);}
.measure-change.negative{background:rgba(248,113,113,0.12);color:var(--red);}
.measure-change.neutral{background:rgba(255,255,255,0.06);color:var(--muted);}
.measure-date{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:4px;}

/* ── CHART ── */
.chart-wrap{padding:14px 18px 4px;position:relative;}
.chart-svg{width:100%;height:120px;}
.chart-label{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;text-anchor:middle;}
.chart-val-label{font-size:9px;fill:var(--muted);font-family:'DM Mono',monospace;text-anchor:middle;}

/* ── BODY MEASUREMENTS ── */
.body-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 18px;}
.body-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;}
.body-label{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
.body-val{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;}
.body-change{font-size:10px;margin-top:2px;}
.body-change.pos{color:var(--green);}
.body-change.neg{color:var(--red);}

/* ── ADD MEASUREMENT BUTTON ── */
.add-measure-btn{margin:4px 18px 14px;width:calc(100% - 36px);padding:12px;background:transparent;border:1px dashed var(--border2);border-radius:10px;color:var(--muted);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
.add-measure-btn:active{background:rgba(255,255,255,0.03);}

/* ── TRAINING HISTORY ── */
.train-card{margin:6px 18px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;animation:slideUp 0.25s ease both;}
.train-card-hdr{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.train-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
.train-type{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
.train-badge{font-size:10px;padding:3px 8px;border-radius:99px;background:rgba(232,48,42,0.12);color:var(--accent);font-family:'DM Mono',monospace;}
.train-exercises{padding:10px 14px;}
.exercise-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.exercise-row:last-child{border-bottom:none;}
.ex-name{flex:1;font-size:13px;font-weight:500;}
.ex-sets{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);}
.ex-pr{font-size:10px;padding:2px 6px;border-radius:99px;background:rgba(245,158,11,0.15);color:var(--yellow);font-weight:700;flex-shrink:0;}
.train-note{padding:8px 14px 12px;font-size:12px;color:var(--muted);line-height:1.5;font-style:italic;}

/* ── RANKING ── */
.rank-header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.rank-my-pos{display:flex;align-items:center;gap:8px;}
.rank-pos-big{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;color:var(--accent);}
.rank-pos-sub{font-size:11px;color:var(--muted);}
.rank-xp-box{text-align:right;}
.rank-xp-big{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--yellow);}
.rank-xp-sub{font-size:10px;color:var(--muted);}
.rank-row{display:flex;align-items:center;padding:11px 18px;border-bottom:1px solid rgba(255,255,255,0.04);gap:12px;}
.rank-row.me{background:rgba(232,48,42,0.06);border-left:2px solid var(--accent);}
.rank-num{font-size:16px;font-weight:900;width:24px;text-align:center;flex-shrink:0;}
.rank-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
.rank-info{flex:1;min-width:0;}
.rank-name{font-size:13px;font-weight:600;display:flex;align-items:center;gap:5px;}
.me-tag{font-size:9px;background:var(--accent);color:#fff;padding:1px 5px;border-radius:99px;font-weight:700;}
.rank-meta{font-size:10px;color:var(--muted);margin-top:1px;}
.rank-pb{height:3px;background:rgba(255,255,255,0.07);border-radius:99px;margin-top:4px;overflow:hidden;}
.rank-pfill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--yellow),var(--accent));}
.rank-xp-col{text-align:right;flex-shrink:0;}
.rank-xpv{font-family:'DM Mono',monospace;font-size:15px;font-weight:700;color:var(--yellow);}
.rank-xpl{font-size:9px;color:var(--muted);}
.rank-period{display:flex;gap:6px;padding:10px 18px;border-bottom:1px solid var(--border);}
.rp-btn{padding:5px 12px;border-radius:99px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;font-family:'DM Mono',monospace;}
.rp-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.overlay.show{display:flex;}
.modal{background:#111;border:1px solid var(--border2);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:480px;padding:22px 18px;max-height:88dvh;overflow-y:auto;}
.modal-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:16px;}
.modal-close{float:right;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;}
.field{margin-bottom:13px;}
.field label{display:block;font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border2);border-radius:8px;padding:11px 13px;color:var(--text);font-size:14px;outline:none;transition:border-color 0.15s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
.field select option{background:#111;}
.btn-primary{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;}
.btn-primary:active{opacity:0.85;}
.btn-secondary{width:100%;padding:12px;background:transparent;color:var(--muted);border:1px solid var(--border2);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;}

/* ── TRAINER PANEL TABS ── */
.trainer-tabs{display:flex;background:#0a0a0a;border-bottom:1px solid var(--border);flex-shrink:0;}
.ttab{flex:1;padding:10px 4px;font-size:9px;font-weight:700;text-align:center;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all 0.15s;text-transform:uppercase;letter-spacing:0.3px;font-family:'DM Mono',monospace;}
.ttab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tview{display:none;}.tview.active{display:block;}

/* ── TRAINER CLIENT CARD ── */
.t-client-card{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;cursor:pointer;transition:background 0.15s;}
.t-client-card:active{background:rgba(255,255,255,0.03);}
.t-client-card.no-activity{border-left:3px solid var(--red);}
.t-client-card.warn-karnet{border-left:3px solid var(--yellow);}
.tc-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0;}
.tc-info{flex:1;min-width:0;}
.tc-name{font-size:14px;font-weight:600;}
.tc-meta{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px;}
.tc-habits{height:4px;background:rgba(255,255,255,0.07);border-radius:99px;margin-top:5px;overflow:hidden;}
.tc-hfill{height:100%;border-radius:99px;transition:width 0.4s;}
.tc-right{text-align:right;flex-shrink:0;}

function getLevel(xp){
  return LEVELS.slice().reverse().find(l=>xp>=l.xp)||LEVELS[0];
}
function getLevelProgress(xp){
  const cur=getLevel(xp);const idx=LEVELS.indexOf(cur);
  if(idx>=LEVELS.length-1)return{cur,next:null,pct:100};
  const next=LEVELS[idx+1];
  const pct=Math.round((xp-cur.xp)/(next.xp-cur.xp)*100);
  return{cur,next,pct};
}
function getLeague(xp){return LEAGUES.slice().reverse().find(l=>xp>=l.min)||LEAGUES[0];}
function sortedClients(){
  const l=Object.values(allClients);
  if(lbPeriod==='streak')return l.sort((a,b)=>(b.streak||0)-(a.streak||0));
  if(lbPeriod==='today')return l.sort((a,b)=>(b.xpToday||0)-(a.xpToday||0));
  if(lbPeriod==='weekly')return l.sort((a,b)=>(b.xpWeekly||0)-(a.xpWeekly||0));
  return l.sort((a,b)=>(b.xpTotal||0)-(a.xpTotal||0));
}

function fmtDate(s){

}

  loginMode=m;
  document.querySelectorAll('.ltab').forEach((el,i)=>el.classList.toggle('active',['client','trainer'][i]===m));
  document.getElementById('l-err').textContent='';
}
function doLogin(){
  const name=document.getElementById('l-name').value.trim();
  const pass=document.getElementById('l-pass').value;
  if(!name||!pass){document.getElementById('l-err').textContent='Podaj imię i hasło.';return;}
  if(loginMode==='trainer'){
    if(name===TRAINER_NAME&&pass===TRAINER_PASS)loginTrainer();
    else document.getElementById('l-err').textContent='Błędne dane trenera.';
    return;
  }
  DB.ref('Klienci').orderByChild('name').equalTo(name).once('value').then(snap=>{
    if(!snap.exists()){document.getElementById('l-err').textContent='Nie znaleziono klienta.';return;}
    let found=null;
    snap.forEach(c=>{if(c.val().pass===pass)found={id:c.key,...c.val()};});
    if(!found){document.getElementById('l-err').textContent='Błędne hasło.';return;}
    loginClient(found);
  }).catch(()=>document.getElementById('l-err').textContent='Błąd połączenia.');
}
function loginClient(cl){
  currentUser=cl;currentRole='client';
  const av=document.getElementById('c-av');
  av.textContent=cl.name[0];av.style.background=cl.color||'#e8302a';
  document.getElementById('c-sub').textContent=cl.name+' · '+new Date().toLocaleDateString('pl',{weekday:'short',day:'numeric',month:'short'});
  showScreen('client');
  startListeners();
  cNav('dash');
}
function loginTrainer(){
  currentRole='trainer';showScreen('trainer');
  startListeners();
  tTab('clients');
  renderQuickChallenges();
  renderMsgTemplates();
}
function logout(){
  stopListeners();currentUser=null;currentRole=null;
  document.getElementById('l-name').value='';document.getElementById('l-pass').value='';
  showScreen('login');
}
function showScreen(s){
  document.querySelectorAll('.screen').forEach(el=>el.classList.remove('active'));
  document.getElementById('sc-'+s).classList.add('active');
}

// ══════════════════════════════════════════════════
// REALTIME LISTENERS
// ══════════════════════════════════════════════════
function startListeners(){
  stopListeners();
  const push=(ref,fn)=>{const cb=DB.ref(ref).on('value',fn);listeners.push({ref,cb});};
  push('Klienci',snap=>{
    allClients={};
    if(snap.exists())snap.forEach(c=>allClients[c.key]={id:c.key,...c.val()});
    if(currentUser){const u=Object.values(allClients).find(c=>c.id===currentUser.id);if(u)currentUser=u;}
    if(currentRole==='client'&&cCurrentView==='dash')renderDash();
    if(currentRole==='client'&&cCurrentView==='ranking')renderRanking();
    if(currentRole==='trainer')renderTrainerClients();
    populateTrainerSelects();
  });
  push('challenge',snap=>{
    sharedChallenge=snap.exists()?snap.val():null;
    if(currentRole==='client'&&cCurrentView==='habits')renderHabits();
    if(currentRole==='client'&&cCurrentView==='dash')renderDash();
  });
  push('CustomHabits',snap=>{
    allCustomHabits={};
    if(snap.exists())snap.forEach(h=>allCustomHabits[h.key]={id:h.key,...h.val()});
    if(currentRole==='client'&&cCurrentView==='habits')renderHabits();
  });
  push('Measurements',snap=>{
    allMeasurements={};
    if(snap.exists())snap.forEach(m=>allMeasurements[m.key]={id:m.key,...m.val()});
    if(currentRole==='client'&&cCurrentView==='measures')renderMeasures();
    if(currentRole==='client'&&cCurrentView==='dash')renderDash();
  });
  push('Trainings',snap=>{
    allTrainings={};
    if(snap.exists())snap.forEach(t=>allTrainings[t.key]={id:t.key,...t.val()});
    if(currentRole==='client'&&cCurrentView==='trainings')renderTrainings();
    if(currentRole==='client'&&cCurrentView==='dash')renderDash();
  });
  push('TrainerMessages',snap=>{
    allMessages={};
    if(snap.exists())snap.forEach(m=>allMessages[m.key]={id:m.key,...m.val()});
    if(currentRole==='client'&&cCurrentView==='dash')renderDash();
  });
}
function stopListeners(){
  listeners.forEach(({ref,cb})=>DB.ref(ref).off('value',cb));
  listeners=[];
}

// ══════════════════════════════════════════════════
// CLIENT NAVIGATION
// ══════════════════════════════════════════════════
function cNav(view){
  cCurrentView=view;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('nav-'+view);
  if(btn)btn.classList.add('active');
  if(view==='dash')renderDash();
  else if(view==='habits')renderHabits();
  else if(view==='measures')renderMeasures();
  else if(view==='trainings')renderTrainings();
  else if(view==='ranking')renderRanking();
  document.getElementById('c-scroll').scrollTop=0;
}

// ══════════════════════════════════════════════════
// DASHBOARD
// ══════════════════════════════════════════════════
function renderDash(){
  if(!currentUser)return;
  const u=currentUser;
  const xp=u.xpTotal||0;
  const level=getLevel(xp);
  const league=getLeague(xp);
  const {cur,next,pct}=getLevelProgress(xp);
  const done=HABITS.filter(h=>(u.checked||{})[h.id]).length;
  const total=HABITS.length;
  const habitPct=Math.round(done/total*100);

  // Last measurement
  const myMeas=Object.values(allMeasurements)
    .filter(m=>m.clientId===u.id)
    .sort((a,b)=>b.date.localeCompare(a.date));
  const lastMeas=myMeas[0]||null;
  const prevMeas=myMeas[1]||null;
  const weightDiff=lastMeas&&prevMeas&&lastMeas.weight&&prevMeas.weight
    ?(lastMeas.weight-prevMeas.weight).toFixed(1):null;

  // Last training
  const myTrainings=Object.values(allTrainings)
    .filter(t=>t.clientId===u.id)
    .sort((a,b)=>b.date.localeCompare(a.date));
  const lastTrain=myTrainings[0]||null;
  const monthTrainings=myTrainings.filter(t=>t.date&&t.date.startsWith(todayStr().slice(0,7))).length;

  // Trainer message
  const myMsgs=Object.values(allMessages)
    .filter(m=>m.clientId===u.id)
    .sort((a,b)=>(b.ts||0)-(a.ts||0));
  const lastMsg=myMsgs[0]||null;

  // Motivation quote
  const day=new Date().getDate()+new Date().getMonth()*31;
  const q=QUOTES[day%QUOTES.length];

  const greetings=['Siema','Cześć','Hej','Co słychać'];
  const gr=greetings[new Date().getHours()%greetings.length];

  let html=`
  <div class="dash-hero">
    <div class="dash-greeting">${gr}, Trener mówi:</div>
    <div class="dash-name">${u.name} 💪</div>
    <div class="dash-streak-row">
      <div class="dash-streak-badge">🔥 ${u.streak||0} dni passy</div>
      <div class="dash-league" style="margin-left:6px">${league.icon} Liga ${league.name}</div>
    </div>
  </div>

  <div class="lv-wrap">
    <div class="lv-top">
      <div class="lv-name">${cur.icon} Level ${cur.lv} — ${cur.name}</div>
      <div class="lv-xp">${xp} ${next?'/ '+next.xp+' XP':'XP MAX'}</div>
    </div>
    <div class="lv-bg"><div class="lv-fill" style="width:${pct}%"></div></div>
  </div>`;

  // Trainer message
  if(lastMsg){
    html+=`<div style="height:10px"></div>
    <div class="trainer-msg">
      <div class="tm-top">
        <div class="tm-av">T</div>
        <div class="tm-who">Wiadomość od trenera</div>
      </div>
      <div class="tm-text">${lastMsg.text}</div>
      <div class="tm-date">${fmtDate(lastMsg.date||'')}</div>
    </div>`;
  }

  // Motivation
  html+=`<div class="motiv-card" onclick="nextMotivDash()">
    <div class="motiv-text">${q.icon} „${q.text}"</div>
    <div class="motiv-tap">Dotknij po następną myśl →</div>
  </div>`;

  // Stats grid
  html+=`<div class="stat-grid">
    <div class="stat-card">
      <div class="stat-label">Treningi w miesiącu</div>
      <div class="stat-val">${monthTrainings}<span class="stat-unit">szt</span></div>
      <div class="stat-sub">${lastTrain?'Ostatni: '+fmtDate(lastTrain.date):'Brak historii'}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Nawyki dziś</div>
      <div class="stat-val">${done}<span class="stat-unit">/ ${total}</span></div>
      <div class="stat-sub">${habitPct}% planu</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Aktualna waga</div>
      <div class="stat-val">${lastMeas&&lastMeas.weight?lastMeas.weight:'—'}<span class="stat-unit">kg</span></div>
      ${weightDiff!==null?`<div class="stat-trend ${Number(weightDiff)<0?'down':'up'}">${Number(weightDiff)>0?'+':''}${weightDiff} kg</div>`:'<div class="stat-sub">Brak pomiaru</div>'}
    </div>
    <div class="stat-card">
      <div class="stat-label">XP ten tydzień</div>
      <div class="stat-val" style="color:var(--yellow)">${u.xpWeekly||0}</div>
      <div class="stat-sub">Łącznie: ${xp} XP</div>
    </div>
  </div>`;

  // Challenge banner if active
  if(sharedChallenge){
    const done2=allClients[u.id]?.challengeDone;
    const comps=sharedChallenge.completions?Object.values(sharedChallenge.completions):[];
    html+=`<div class="ch-banner">
      <div class="ch-tag">${sharedChallenge.emoji||'⚡'} Wyzwanie od Trenera</div>
      <div class="ch-title">${sharedChallenge.name}</div>
      ${sharedChallenge.desc?`<div class="ch-desc">${sharedChallenge.desc}</div>`:''}
      <div class="ch-foot">
        <div><div class="ch-xp">+${sharedChallenge.xp}</div><div style="font-size:9px;color:var(--muted)">BONUS XP</div></div>
        <button class="ch-btn${done2?' done':''}" onclick="completeChallenge()">${done2?'✅ Zaliczone!':'⚡ Zaliczyłem!'}</button>
      </div>
      <div class="ch-who">${comps.length?'✅ Zaliczyli: '+comps.map(c=>c.name).join(', '):'Bądź pierwszy! 🚀'}</div>
    </div>`;
  }

  // Upcoming training (next session from trainer schedule)
  if(lastTrain){
    const karnetLeft=u.packageLeft||0;
    const karnetCls=karnetLeft===0?'empty':karnetLeft<=2?'warn':'ok';
    const karnetTxt=karnetLeft===0?'❌ Brak karnetu':karnetLeft<=2?`⚠️ Zostało ${karnetLeft}`:`🎫 ${karnetLeft} treningów`;
    html+=`<div class="next-train">
      <div class="nt-icon">🏋️</div>
      <div class="nt-info">
        <div class="nt-label">Ostatni trening</div>
        <div class="nt-date">${fmtDate(lastTrain.date)} · ${lastTrain.type||'Trening'}</div>
        <div class="nt-karnet">${karnetTxt}</div>
      </div>
      <div class="nt-badge ${karnetCls}">${karnetLeft}</div>
    </div>`;
  }

  html+=`<div style="height:20px"></div>`;
  document.getElementById('c-view').innerHTML=html;
}

let dashMotivIdx=-1;
function nextMotivDash(){
  dashMotivIdx=(dashMotivIdx+1)%QUOTES.length;
  const q=QUOTES[dashMotivIdx];
  const el=document.querySelector('.motiv-card');
  if(el)el.querySelector('.motiv-text').textContent=q.icon+' „'+q.text+'"';
}

// HABITS VIEW
// ══════════════════════════════════════════════════
function renderHabits(){
  if(!currentUser)return;
  const u=currentUser;
  const ck=u.checked||{};
  const done=HABITS.filter(h=>ck[h.id]).length;
  const total=HABITS.length;
  const pct=Math.round(done/total*100);
  const xpToday=u.xpToday||0;

  let html=`
  <div style="padding:14px 18px 4px;display:flex;align-items:center;justify-content:space-between;">
    <div>
      <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800">${done}/${total} nawyki</div>
      <div style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px">⚡ ${xpToday} XP dziś · 🔥 ${u.streak||0} dni passy</div>
    </div>
    <div style="font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:${pct===100?'var(--green)':'var(--accent)'}">${pct}%</div>
  </div>
  <div class="prog-bar-wrap">
    <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${pct}%"></div></div>
  </div>`;

  // Challenge
  if(sharedChallenge){
    const isDone=allClients[u.id]?.challengeDone;
    const comps=sharedChallenge.completions?Object.values(sharedChallenge.completions):[];
    html+=`<div class="ch-banner" style="margin-bottom:2px">
      <div class="ch-tag">${sharedChallenge.emoji||'⚡'} Wyzwanie dnia</div>
      <div class="ch-title">${sharedChallenge.name}</div>
      ${sharedChallenge.desc?`<div class="ch-desc">${sharedChallenge.desc}</div>`:''}
      <div class="ch-foot">
        <div><div class="ch-xp">+${sharedChallenge.xp}</div><div style="font-size:9px;color:var(--muted)">BONUS XP</div></div>
        <button class="ch-btn${isDone?' done':''}" onclick="completeChallenge()">${isDone?'✅ Zaliczone!':'⚡ Zaliczyłem!'}</button>
      </div>
      <div class="ch-who">${comps.length?'Zaliczyli: '+comps.map(c=>c.name).join(', '):'Bądź pierwszy! 🚀'}</div>
    </div>`;
  }

  // Standard habits
  let lastPhase=null;
  HABITS.forEach(h=>{
    if(h.phase&&h.phase!==lastPhase){
      html+=`<div class="habit-phase" style="color:${h.phaseCls||'var(--muted)'}">${h.phase}</div>`;
      lastPhase=h.phase;
    }
    const checked=!!ck[h.id];
    html+=`<div class="habit-row${checked?' done':''}" onclick="toggleHabit('${h.id}')">
      <div class="hchk${checked?' checked':''}">${checked?'✓':''}</div>
      <div class="habit-info">
        <div class="habit-name">${h.name}</div>
        <div class="habit-meta">${h.meta}</div>
      </div>
      <div class="habit-xp">+${h.xp}</div>
    </div>`;
  });

  // Custom habits from trainer
  const customHabits=Object.values(allCustomHabits).sort((a,b)=>a.level-b.level);
  if(customHabits.length){
    html+=`<div class="habit-phase" style="color:var(--yellow)">⭐ Dodatkowe od trenera</div>`;
    customHabits.forEach(h=>{
      const hid='ch_'+h.id;
      const checked=!!ck[hid];
      html+=`<div class="habit-row${checked?' done':''}" onclick="toggleCustomHabit('${h.id}')">
        <div class="hchk${checked?' checked':''}">${checked?'✓':''}</div>
        <div class="habit-info">
          <div class="habit-name">${h.emoji||'⭐'} ${h.name}</div>
          <div class="habit-meta">${h.desc||h.cat||''}</div>
        </div>
        <div class="habit-xp" style="color:var(--yellow)">+${h.xp}</div>
      </div>`;
    });
  }

  html+=`<div style="padding:16px 18px;">
    <button onclick="shareHabits()" style="width:100%;padding:12px;background:#25D366;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;">📤 Podziel się wynikiem na WhatsApp</button>
  </div>
  <div style="height:16px"></div>`;

  document.getElementById('c-view').innerHTML=html;
}

function toggleHabit(id){
  if(!currentUser)return;
  const h=HABITS.find(x=>x.id===id);if(!h)return;
  const u=currentUser;const ck={...(u.checked||{})};
  let xpd=u.xpToday||0,xpt=u.xpTotal||0,xpw=u.xpWeekly||0;
  if(ck[id]){delete ck[id];xpd=Math.max(0,xpd-h.xp);xpt=Math.max(0,xpt-h.xp);xpw=Math.max(0,xpw-h.xp);}
  else{ck[id]=true;xpd+=h.xp;xpt+=h.xp;xpw+=h.xp;showFlash('+'+h.xp+' XP ⚡');}
  DB.ref('Klienci/'+u.id).update({checked:ck,xpToday:xpd,xpTotal:xpt,xpWeekly:xpw});
  if(Object.keys(ck).filter(k=>!k.startsWith('ch_')).length===HABITS.length)showFlash('🏆 PERFECT DAY! Wszystkie nawyki zaliczone!');
}
function toggleCustomHabit(habitId){
  if(!currentUser)return;
  const h=allCustomHabits[habitId];if(!h)return;
  const u=currentUser;const ck={...(u.checked||{})};const hid='ch_'+habitId;
  let xpd=u.xpToday||0,xpt=u.xpTotal||0,xpw=u.xpWeekly||0;
  if(ck[hid]){delete ck[hid];xpd=Math.max(0,xpd-h.xp);xpt=Math.max(0,xpt-h.xp);xpw=Math.max(0,xpw-h.xp);}
  else{ck[hid]=true;xpd+=h.xp;xpt+=h.xp;xpw+=h.xp;showFlash('+'+h.xp+' XP ⚡ '+h.emoji);}
  DB.ref('Klienci/'+u.id).update({checked:ck,xpToday:xpd,xpTotal:xpt,xpWeekly:xpw});
}
function completeChallenge(){
  if(!currentUser||!sharedChallenge)return;
  const u=currentUser;
  if(allClients[u.id]?.challengeDone){showFlash('Już zaliczone! ✅');return;}
  const xp=sharedChallenge.xp||50;
  DB.ref('Klienci/'+u.id).update({challengeDone:true,xpToday:(u.xpToday||0)+xp,xpTotal:(u.xpTotal||0)+xp,xpWeekly:(u.xpWeekly||0)+xp});
  DB.ref('challenge/completions').push({name:u.name,color:u.color});
  showFlash('⚡ +'+xp+' XP Wyzwanie zaliczone!');
}
function shareHabits(){
  if(!currentUser)return;
  const u=currentUser,s=sortedClients(),rank=s.findIndex(c=>c.id===u.id)+1;
  const done=HABITS.filter(h=>(u.checked||{})[h.id]).length;
  const league=getLeague(u.xpTotal||0);
  const msg=`💪 ${u.name} — postęp dnia!\n\n✅ Nawyki: ${done}/${HABITS.length}\n⚡ XP dziś: ${u.xpToday||0}\n🏅 XP łącznie: ${u.xpTotal||0}\n🏆 Ranking: #${rank}/${s.length}\n🔥 Passa: ${u.streak||0} dni\n${league.icon} Liga: ${league.name}\n\nPROGRESS Nawyki · Wrocław 💪`;
  try{navigator.clipboard.writeText(msg);}catch(e){}
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
}

// ══════════════════════════════════════════════════
// MEASUREMENTS VIEW
// ══════════════════════════════════════════════════
function renderMeasures(){
  if(!currentUser)return;
  const u=currentUser;
  const myMeas=Object.values(allMeasurements)
    .filter(m=>m.clientId===u.id)
    .sort((a,b)=>b.date.localeCompare(a.date));
  const last=myMeas[0]||null;
  const prev=myMeas[1]||null;

  let html='';

  if(last&&last.weight){
    const diff=prev&&prev.weight?(last.weight-prev.weight).toFixed(1):null;
    const diffCls=diff===null?'neutral':Number(diff)<0?'positive':'negative';
    const diffTxt=diff===null?'Pierwszy pomiar':Number(diff)<0?diff+' kg 📉':'+'+diff+' kg 📈';
    html+=`<div class="measure-hero">
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Aktualna waga</div>
      <div class="measure-current">
        <div class="measure-big">${last.weight}</div>
        <div class="measure-unit">kg</div>
        <div class="measure-change ${diffCls}" style="margin-left:10px">${diffTxt}</div>
      </div>
      <div class="measure-date">Ostatni pomiar: ${fmtDate(last.date)}</div>
    </div>`;
    // Weight chart
    const chartData=myMeas.slice(0,8).reverse();
    if(chartData.length>=2){html+=buildWeightChart(chartData);}
  } else {
    html+=`<div class="empty-state"><div class="empty-icon">📏</div><div class="empty-text">Brak pomiarów.<br>Trener wpisze Twoje dane po treningu.</div></div>`;
  }

  // Body measurements grid
  if(last){
    html+=`<div class="sec-label">Obwody ciała</div>
    <div class="body-grid">`;
    const fields=[
      {key:'fat',label:'% Tłuszczu',unit:'%'},
      {key:'chest',label:'Klatka',unit:'cm'},
      {key:'waist',label:'Talia',unit:'cm'},
      {key:'hips',label:'Biodra',unit:'cm'},
      {key:'arm',label:'Ramię',unit:'cm'},
      {key:'thigh',label:'Udo',unit:'cm'},
    ];
    fields.forEach(f=>{
      const val=last[f.key];
      const pval=prev?prev[f.key]:null;
      const diff=val&&pval?(val-pval).toFixed(1):null;
      const isGoodDown=f.key==='fat'||f.key==='waist'||f.key==='hips';
      const cls=diff===null?'':(isGoodDown?(Number(diff)<0?'pos':'neg'):(Number(diff)>0?'pos':'neg'));
      html+=`<div class="body-card">
        <div class="body-label">${f.label}</div>
        <div class="body-val">${val||'—'}<span style="font-size:12px;color:var(--muted)">${val?f.unit:''}</span></div>
        ${diff!==null?`<div class="body-change ${cls}">${Number(diff)>0?'+':''}${diff} ${f.unit}</div>`:''}
      </div>`;
    });
    html+='</div>';
  }

  // History list
  if(myMeas.length>0){
    html+=`<div class="sec-label">Historia pomiarów</div>`;
    myMeas.slice(0,6).forEach(m=>{
      html+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-bottom:1px solid rgba(255,255,255,0.04);">
        <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)">${fmtDate(m.date)}</div>
        <div style="font-size:13px;font-weight:600">${m.weight?m.weight+' kg':'—'}</div>
        ${m.fat?`<div style="font-size:11px;color:var(--muted)">${m.fat}% tłuszczu</div>`:'<div></div>'}
      </div>`;
    });
  }

  html+=`<div style="height:16px"></div>`;
  document.getElementById('c-view').innerHTML=html;
}

function buildWeightChart(data){
  const W=320,H=100,pad=30;
  const vals=data.map(d=>d.weight);
  const min=Math.min(...vals)-1,max=Math.max(...vals)+1;
  const xStep=(W-pad*2)/(data.length-1);
  const yScale=(H-20)/(max-min);
  const points=data.map((d,i)=>{
    const x=pad+i*xStep;
    const y=H-10-(d.weight-min)*yScale;
    return{x,y,w:d.weight,date:d.date};
  });
  const pathD='M'+points.map(p=>`${p.x},${p.y}`).join(' L');
  const areaD=pathD+` L${points[points.length-1].x},${H-5} L${points[0].x},${H-5} Z`;
  let svg=`<div class="chart-wrap"><svg class="chart-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e8302a" stop-opacity="0.3"/><stop offset="100%" stop-color="#e8302a" stop-opacity="0"/></linearGradient></defs>
    <path d="${areaD}" fill="url(#wg)"/>
    <path d="${pathD}" fill="none" stroke="#e8302a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
  points.forEach(p=>{
    svg+=`<circle cx="${p.x}" cy="${p.y}" r="3" fill="#e8302a"/>`;
    svg+=`<text x="${p.x}" y="${p.y-7}" class="chart-val-label" fill="#888" font-size="9" text-anchor="middle">${p.w}</text>`;
  });
  // date labels
  [0,Math.floor(points.length/2),points.length-1].forEach(i=>{
    if(!points[i])return;
    const d=new Date(data[i].date+'T12:00:00');
    const lbl=d.getDate()+'.'+(d.getMonth()+1);
    svg+=`<text x="${points[i].x}" y="${H}" class="chart-label" fill="#555" font-size="9" text-anchor="middle">${lbl}</text>`;
  });
  svg+=`</svg></div>`;
  return svg;
}

// ══════════════════════════════════════════════════
// TRAININGS VIEW
// ══════════════════════════════════════════════════
function renderTrainings(){
  if(!currentUser)return;
  const u=currentUser;
  const myTrainings=Object.values(allTrainings)
    .filter(t=>t.clientId===u.id)
    .sort((a,b)=>b.date.localeCompare(a.date));

  if(!myTrainings.length){
    document.getElementById('c-view').innerHTML=`<div class="empty-state"><div class="empty-icon">🏋️</div><div class="empty-text">Brak historii treningów.<br>Trener będzie wpisywał Twoje wyniki<br>po każdym treningu.</div></div>`;
    return;
  }

  const monthCount=myTrainings.filter(t=>t.date&&t.date.startsWith(todayStr().slice(0,7))).length;
  let html=`<div style="padding:14px 18px 6px;display:flex;align-items:center;justify-content:space-between;">
    <div><div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800">${myTrainings.length} treningów</div>
    <div style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px">W tym miesiącu: ${monthCount}</div></div>
  </div>`;

  myTrainings.slice(0,20).forEach(t=>{
    const exercises=t.exercises||[];
    html+=`<div class="train-card">
      <div class="train-card-hdr">
        <div><div class="train-date">${fmtDate(t.date)}</div><div class="train-type">${t.type||'Trening'}</div></div>
        <div class="train-badge">${exercises.length} ćwiczeń</div>
      </div>`;
    if(exercises.length){
      html+=`<div class="train-exercises">`;
      exercises.forEach(ex=>{
        html+=`<div class="exercise-row">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-sets">${ex.sets}</div>
          ${ex.pr?'<div class="ex-pr">🏆 PR</div>':''}
        </div>`;
      });
      html+=`</div>`;
    }
    if(t.note){html+=`<div class="train-note">💬 ${t.note}</div>`;}
    html+=`</div>`;
  });
  html+=`<div style="height:20px"></div>`;
  document.getElementById('c-view').innerHTML=html;
}

// ══════════════════════════════════════════════════
// RANKING VIEW
// ══════════════════════════════════════════════════
function renderRanking(){
  if(!currentUser)return;
  const s=sortedClients();
  const myIdx=s.findIndex(c=>c.id===currentUser.id);
  const medals=['🥇','🥈','🥉'];
  const max=Math.max(...s.map(c=>lbPeriod==='streak'?(c.streak||0):lbPeriod==='today'?(c.xpToday||0):lbPeriod==='weekly'?(c.xpWeekly||0):(c.xpTotal||0)),1);

  let html=`<div class="rank-header">
    <div class="rank-my-pos">
      <div class="rank-pos-big">#${myIdx+1}</div>
      <div><div style="font-size:14px;font-weight:600">${currentUser.name}</div>
      <div class="rank-pos-sub">z ${s.length} osób</div></div>
    </div>
    <div class="rank-xp-box">
      <div class="rank-xp-big">${currentUser.xpTotal||0}</div>
      <div class="rank-xp-sub">XP łącznie</div>
    </div>
  </div>
  <div class="rank-period">
    <button class="rp-btn ${lbPeriod==='total'?'active':''}" onclick="setLbPeriod('total')">Total</button>
    <button class="rp-btn ${lbPeriod==='weekly'?'active':''}" onclick="setLbPeriod('weekly')">Tydzień</button>
    <button class="rp-btn ${lbPeriod==='streak'?'active':''}" onclick="setLbPeriod('streak')">🔥 Passa</button>
    <button class="rp-btn ${lbPeriod==='today'?'active':''}" onclick="setLbPeriod('today')">Dziś</button>
  </div>`;

  s.forEach((cl,i)=>{
    const isMe=cl.id===currentUser.id;
    const val=lbPeriod==='streak'?(cl.streak||0):lbPeriod==='today'?(cl.xpToday||0):lbPeriod==='weekly'?(cl.xpWeekly||0):(cl.xpTotal||0);
    const pct=Math.round(val/max*100);
    const done=HABITS.filter(h=>(cl.checked||{})[h.id]).length;
    const league=getLeague(cl.xpTotal||0);
    html+=`<div class="rank-row${isMe?' me':''}">
      <div class="rank-num">${i<3?medals[i]:i+1}</div>
      <div class="rank-av" style="background:${cl.color||'#888'}">${cl.name[0]}</div>
      <div class="rank-info">
        <div class="rank-name">${cl.name}${isMe?'<span class="me-tag">TY</span>':''} ${league.icon}</div>
        <div class="rank-meta">Dziś: ${done}/${HABITS.length} · 🔥 ${cl.streak||0} dni</div>
        <div class="rank-pb"><div class="rank-pfill" style="width:${pct}%"></div></div>
      </div>
      <div class="rank-xp-col">
        <div class="rank-xpv">${val}</div>
        <div class="rank-xpl">${lbPeriod==='streak'?'dni':'XP'}</div>
      </div>
    </div>`;
  });
  html+=`<div style="height:20px"></div>`;
  document.getElementById('c-view').innerHTML=html;
}
function setLbPeriod(p){lbPeriod=p;renderRanking();}

// TRAINER PANEL
// ══════════════════════════════════════════════════
function tTab(t){
  document.querySelectorAll('.ttab').forEach((el,i)=>el.classList.toggle('active',['clients','trainings','measures','challenge','message'][i]===t));
  document.querySelectorAll('.tview').forEach(el=>el.classList.remove('active'));
  document.getElementById('tv-'+t).classList.add('active');
  tCurrentTab=t;
}

function renderTrainerClients(){
  const el=document.getElementById('tv-clients');if(!el)return;
  const list=Object.values(allClients).sort((a,b)=>(b.xpTotal||0)-(a.xpTotal||0));
  if(!list.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-text">Brak klientów w Firebase.<br>Dodaj ich w aplikacji nawyków.</div></div>';return;}

  // Alerts section
  const inactive=list.filter(cl=>{
    const myT=Object.values(allTrainings).filter(t=>t.clientId===cl.id).sort((a,b)=>b.date.localeCompare(a.date));
    if(!myT.length)return false;
    const last=new Date(myT[0].date+'T12:00:00');
    const diffDays=Math.floor((new Date()-last)/(1000*60*60*24));
    return diffDays>=7;
  });
  const lowKarnet=list.filter(cl=>(cl.packageLeft||0)<=2);

  let html='';
  if(inactive.length||lowKarnet.length){
    html+=`<div style="padding:12px 18px;background:rgba(248,113,113,0.06);border-bottom:1px solid rgba(248,113,113,0.15);">
      <div style="font-size:10px;font-weight:700;color:var(--red);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">⚠️ Alerty</div>`;
    inactive.forEach(cl=>{html+=`<div style="font-size:12px;color:var(--muted);padding:3px 0;">🔴 ${cl.name} — brak treningu od 7+ dni</div>`;});
    lowKarnet.forEach(cl=>{html+=`<div style="font-size:12px;color:var(--muted);padding:3px 0;">🟡 ${cl.name} — karnet kończy się (${cl.packageLeft||0} treningów)</div>`;});
    html+=`</div>`;
  }

  list.forEach(cl=>{
    const done=HABITS.filter(h=>(cl.checked||{})[h.id]).length;
    const pct=Math.round(done/HABITS.length*100);
    const fillColor=pct===100?'var(--green)':pct>=50?'var(--yellow)':'var(--red)';
    const myT=Object.values(allTrainings).filter(t=>t.clientId===cl.id).sort((a,b)=>b.date.localeCompare(a.date));
    const lastTrain=myT[0]||null;
    const league=getLeague(cl.xpTotal||0);
    const isInactive=inactive.find(c=>c.id===cl.id);
    const isLow=lowKarnet.find(c=>c.id===cl.id);
    html+=`<div class="t-client-card${isInactive?' no-activity':isLow?' warn-karnet':''}">
      <div class="tc-av" style="background:${cl.color||'#888'}">${cl.name[0]}</div>
      <div class="tc-info">
        <div class="tc-name">${cl.name} ${league.icon}</div>
        <div class="tc-meta">🔥${cl.streak||0} dni · ⚡${cl.xpTotal||0} XP · Nawyki: ${done}/${HABITS.length}</div>
        <div class="tc-habits"><div class="tc-hfill" style="width:${pct}%;background:${fillColor}"></div></div>
        ${lastTrain?`<div style="font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:3px">Ostatni trening: ${fmtDate(lastTrain.date)}</div>`:''}
      </div>
      <div class="tc-right">
        <div class="tc-xp">${cl.xpTotal||0}</div>
        <div class="tc-streak">🎫 ${cl.packageLeft||0}</div>
        ${isInactive?'<div class="tc-alert red">nieaktywny</div>':''}
        ${!isInactive&&isLow?'<div class="tc-alert yellow">karnet!</div>':''}
      </div>
    </div>`;
  });
  el.innerHTML=html;
}

function populateTrainerSelects(){
  const list=Object.values(allClients).sort((a,b)=>a.name.localeCompare(b.name));
  const opts='<option value="">— Wybierz klienta —</option>'+list.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  ['t-train-client','t-meas-client','t-msg-client'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){const val=el.value;el.innerHTML=opts;el.value=val;}
  });
}

// ── SAVE TRAINING ──────────────────────────────────────────
let exCount=1;
function addExRow(){
  const b=document.getElementById('ex-builder');
  const row=document.createElement('div');
  row.className='ex-row';
  row.innerHTML=`<input placeholder="Ćwiczenie" id="ex${exCount}-name"><input placeholder="Seria (np. 4x80kg)" id="ex${exCount}-sets" style="max-width:120px"><button class="ex-del" onclick="this.parentElement.remove()">✕</button>`;
  b.appendChild(row);exCount++;
}

function saveTraining(){
  const clientId=document.getElementById('t-train-client').value;
  const date=document.getElementById('t-train-date').value;
  const type=document.getElementById('t-train-type').value;
  if(!clientId||!date){showFlash('⚠️ Wybierz klienta i datę!');return;}
  const rows=document.querySelectorAll('#ex-builder .ex-row');
  const exercises=[];
  rows.forEach(row=>{
    const name=row.querySelector('input:first-child')?.value.trim();
    const sets=row.querySelectorAll('input')[1]?.value.trim();
    if(name)exercises.push({name,sets:sets||'—'});
  });
  const note=document.getElementById('t-train-note').value.trim();
  DB.ref('Trainings').push({clientId,date,type,exercises,note,addedAt:Date.now()})
    .then(()=>{
      showFlash('✅ Trening zapisany!');
      document.getElementById('t-train-date').value='';
      document.getElementById('t-train-note').value='';
      document.getElementById('ex-builder').innerHTML=`<div class="ex-row"><input placeholder="Ćwiczenie (np. Martwy ciąg)" id="ex0-name"><input placeholder="Seria (np. 4x80kg)" id="ex0-sets" style="max-width:120px"><button class="ex-del" onclick="this.parentElement.remove()">✕</button></div>`;
      exCount=1;
    });
}

// ── SAVE MEASUREMENT (trainer) ─────────────────────────────
function saveMeasurement(){
  const clientId=document.getElementById('t-meas-client').value;
  const date=document.getElementById('t-meas-date').value;
  if(!clientId||!date){showFlash('⚠️ Wybierz klienta i datę!');return;}
  const data={clientId,date,addedAt:Date.now()};
  const fields=['weight','fat','chest','waist','hips','arm','thigh','calf'];
  fields.forEach(f=>{
    const v=parseFloat(document.getElementById('t-meas-'+f).value);
    if(!isNaN(v)&&v>0)data[f]=v;
  });
  if(Object.keys(data).length<=3){showFlash('⚠️ Wpisz przynajmniej jeden pomiar!');return;}
  DB.ref('Measurements').push(data).then(()=>{
    showFlash('📏 Pomiar zapisany!');
    ['weight','fat','chest','waist','hips','arm','thigh','calf'].forEach(f=>{
      const el=document.getElementById('t-meas-'+f);if(el)el.value='';
    });
  });
}

// ── SAVE MEASUREMENT (client self) ────────────────────────
function saveClientMeasurement(){
  if(!currentUser)return;
  const date=document.getElementById('cm-date').value;
  const weight=parseFloat(document.getElementById('cm-weight').value);
  const fat=parseFloat(document.getElementById('cm-fat').value);
  if(!date||(!weight&&!fat)){showFlash('⚠️ Podaj datę i przynajmniej wagę!');return;}
  const data={clientId:currentUser.id,date,addedAt:Date.now()};
  if(weight)data.weight=weight;
  if(fat)data.fat=fat;
  DB.ref('Measurements').push(data).then(()=>{
    showFlash('📏 Pomiar zapisany!');
    closeModal('modal-meas');
  });
}

// ── CHALLENGE ─────────────────────────────────────────────
function saveChallenge(){
  const name=document.getElementById('t-ch-name').value.trim();
  if(!name){showFlash('⚠️ Podaj nazwę wyzwania!');return;}
  const ch={name,desc:document.getElementById('t-ch-desc').value.trim(),xp:parseInt(document.getElementById('t-ch-xp').value)||50,emoji:document.getElementById('t-ch-emoji').value.trim()||'⚡',completions:{}};
  DB.ref('challenge').set(ch);
  Object.keys(allClients).forEach(id=>DB.ref('Klienci/'+id).update({challengeDone:false}));
  ['t-ch-name','t-ch-desc','t-ch-xp','t-ch-emoji'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  showFlash('⚡ Wyzwanie wysłane do wszystkich!');
}

function renderQuickChallenges(){
  const el=document.getElementById('quick-challenges');if(!el)return;
  el.innerHTML=QUICK_CH.map((c,i)=>`<button onclick="fillChallenge(${i})" style="padding:6px 12px;background:rgba(255,255,255,0.05);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:11px;cursor:pointer;">${c.e} ${c.n.split(' ').slice(0,3).join(' ')}...</button>`).join('');
}
function fillChallenge(i){
  const c=QUICK_CH[i];
  document.getElementById('t-ch-name').value=c.n;
  document.getElementById('t-ch-desc').value=c.d;
  document.getElementById('t-ch-xp').value=c.xp;
  document.getElementById('t-ch-emoji').value=c.e;
}

// ── TRAINER MESSAGE ────────────────────────────────────────
function sendTrainerMessage(){
  const clientId=document.getElementById('t-msg-client').value;
  const text=document.getElementById('t-msg-text').value.trim();
  if(!clientId||!text){showFlash('⚠️ Wybierz klienta i wpisz treść!');return;}
  DB.ref('TrainerMessages').push({clientId,text,date:todayStr(),ts:Date.now()})
    .then(()=>{showFlash('💬 Wiadomość wysłana!');document.getElementById('t-msg-text').value='';});
}
function renderMsgTemplates(){
  const el=document.getElementById('msg-templates');if(!el)return;
  el.innerHTML=MSG_TEMPLATES.map(t=>`<button onclick="fillMsg('${t.text.replace(/'/g,'\\\'')}')" style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:8px;color:var(--text);cursor:pointer;text-align:left;width:100%;">
    <span style="font-size:15px">${t.icon}</span><span style="font-size:12px">${t.text.slice(0,50)}...</span>
  </button>`).join('');
}
function fillMsg(text){document.getElementById('t-msg-text').value=text;}
