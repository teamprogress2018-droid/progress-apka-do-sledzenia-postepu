<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>PROGRESS · Twój postęp</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#0a0a0a;--s1:rgba(14,14,14,0.97);--s2:rgba(20,20,20,0.98);
  --b1:rgba(232,48,42,0.14);--b2:rgba(232,48,42,0.28);
  --tx:#f0ebe6;--mu:#5a5a5a;--mu2:#333;
  --ac:#e8302a;--gr:#4ade80;--rd:#f87171;--bl:#60a5fa;--yw:#f59e0b;--pu:#a78bfa;
  --ra:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;overflow-x:hidden;}
input,select,textarea,button{font-family:'DM Sans',sans-serif;}
.app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;}
.scr{display:none;flex-direction:column;height:100%;overflow:hidden;}
.scr.on{display:flex;}

/* LOGIN */
.lg-bg{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:radial-gradient(ellipse at 50% 0%,rgba(232,48,42,0.1) 0%,transparent 65%);}
.lg-logo{font-family:'Syne',sans-serif;font-size:44px;font-weight:800;color:var(--ac);letter-spacing:-1px;text-shadow:0 0 40px rgba(232,48,42,0.45);}
.lg-sub{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace;letter-spacing:3px;text-transform:uppercase;margin-top:3px;margin-bottom:36px;}
.lg-card{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:var(--ra);padding:22px 18px;}
.lg-tabs{display:flex;gap:7px;margin-bottom:18px;}
.ltab{flex:1;padding:9px;text-align:center;border-radius:8px;border:1px solid var(--b2);font-size:12px;font-weight:600;cursor:pointer;color:var(--mu);transition:all 0.15s;background:transparent;}
.ltab.on{background:var(--ac);border-color:var(--ac);color:#fff;}
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:10px;color:var(--mu);font-family:'DM Mono',monospace;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:4px;}
.fg input,.fg select,.fg textarea{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--b2);border-radius:8px;padding:11px 13px;color:var(--tx);font-size:14px;outline:none;transition:border-color 0.15s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--ac);}
.fg select option{background:#111;}
.fg textarea{resize:none;line-height:1.5;}
.ferr{font-size:11px;color:var(--rd);text-align:center;min-height:16px;margin-bottom:7px;}
.btn-lg{width:100%;padding:14px;background:var(--ac);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;}

/* HEADER */
.hdr{padding:13px 16px 10px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:rgba(5,5,5,0.98);backdrop-filter:blur(10px);}
.hdr-l{display:flex;align-items:center;gap:9px;}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;}
.hdr-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--ac);}
.hdr-sub{font-size:9px;color:var(--mu);font-family:'DM Mono',monospace;}
.hdr-btn{background:transparent;border:1px solid var(--b2);color:var(--mu);border-radius:7px;padding:5px 11px;font-size:11px;cursor:pointer;}

/* NAV */
.nav{display:flex;border-top:1px solid var(--b1);flex-shrink:0;background:rgba(5,5,5,0.98);backdrop-filter:blur(10px);}
.nb{flex:1;padding:9px 0 7px;background:none;border:none;color:var(--mu);font-size:7.5px;font-family:'DM Mono',monospace;cursor:pointer;transition:color 0.15s;display:flex;flex-direction:column;align-items:center;gap:3px;letter-spacing:0.3px;text-transform:uppercase;}
.nb svg{width:17px;height:17px;stroke-width:1.5;stroke:currentColor;fill:none;}
.nb.on{color:var(--ac);}

/* SCROLL */
.sc{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.sc::-webkit-scrollbar{display:none;}

/* TRAINER TABS */
.ttabs{display:flex;background:#080808;border-bottom:1px solid var(--b1);flex-shrink:0;overflow-x:auto;}
.ttabs::-webkit-scrollbar{display:none;}
.ttab2{flex-shrink:0;padding:9px 12px;font-size:9px;font-weight:700;cursor:pointer;color:var(--mu);border-bottom:2px solid transparent;transition:all 0.15s;text-transform:uppercase;letter-spacing:0.3px;font-family:'DM Mono',monospace;white-space:nowrap;}
.ttab2.on{color:var(--ac);border-bottom-color:var(--ac);}
.tv{display:none;}.tv.on{display:block;}

/* CARDS */
.card{background:var(--s2);border:1px solid var(--b1);border-radius:var(--ra);padding:14px;margin-bottom:8px;}
.card-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px;}

/* STATS GRID */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 16px;}
.sc2{background:var(--s2);border:1px solid var(--b1);border-radius:var(--ra);padding:13px;}
.sl{font-size:9px;font-family:'DM Mono',monospace;color:var(--mu);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:5px;}
.sv{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;line-height:1;}
.su{font-size:11px;color:var(--mu);font-weight:400;margin-left:2px;}
.ss{font-size:10px;color:var(--mu);margin-top:3px;}
.st{font-size:10px;font-weight:600;margin-top:2px;}
.st.up{color:var(--gr);}
.st.dn{color:var(--rd);}

/* LEVEL BAR */
.lv{padding:11px 16px;background:var(--s2);border-bottom:1px solid var(--b1);border-top:1px solid var(--b1);}
.lv-t{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.lv-n{font-size:11px;font-weight:600;}
.lv-x{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace;}
.lv-bg{height:5px;background:rgba(255,255,255,0.07);border-radius:99px;overflow:hidden;}
.lv-f{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--ac),#ff6666);transition:width 0.5s;}

/* HERO */
.hero{padding:16px;background:linear-gradient(135deg,rgba(232,48,42,0.07),transparent);border-bottom:1px solid var(--b1);}
.hero-gr{font-size:11px;color:var(--mu);font-family:'DM Mono',monospace;margin-bottom:3px;}
.hero-name{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;line-height:1.1;margin-bottom:10px;}
.badge-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:99px;padding:4px 11px;font-size:11px;font-weight:700;}
.badge.yw{background:rgba(245,158,11,0.14);border:1px solid rgba(245,158,11,0.28);color:var(--yw);}
.badge.bl{background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.22);color:var(--bl);}
.badge.gr{background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.22);color:var(--gr);}

/* MOTIVATION */
.motiv{margin:10px 16px;background:var(--s2);border:1px solid var(--b1);border-left:3px solid var(--ac);border-radius:var(--ra);padding:12px 14px;cursor:pointer;}
.motiv-t{font-size:12px;color:var(--tx);line-height:1.5;font-style:italic;}
.motiv-s{font-size:9px;color:var(--mu);margin-top:5px;font-family:'DM Mono',monospace;}

/* TRAINER MSG */
.tmsg{margin:0 16px 10px;background:rgba(96,165,250,0.07);border:1px solid rgba(96,165,250,0.18);border-radius:var(--ra);padding:13px 14px;}
.tmsg-top{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.tmsg-av{width:26px;height:26px;border-radius:50%;background:var(--ac);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;}
.tmsg-who{font-size:11px;color:var(--bl);font-weight:600;}
.tmsg-txt{font-size:13px;color:var(--tx);line-height:1.5;}
.tmsg-dt{font-size:9px;color:var(--mu);margin-top:4px;font-family:'DM Mono',monospace;}

/* SECTION LABEL */
.slbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:1.2px;padding:14px 16px 6px;}

/* CHART */
.chart-w{padding:12px 16px 4px;}
.chart-svg{width:100%;height:110px;}

/* MEASUREMENTS */
.meas-hero{padding:14px 16px;border-bottom:1px solid var(--b1);}
.meas-big{font-family:'Syne',sans-serif;font-size:48px;font-weight:800;line-height:1;}
.meas-unit{font-size:16px;color:var(--mu);}
.meas-chg{font-size:12px;font-weight:600;padding:3px 9px;border-radius:99px;}
.meas-chg.pos{background:rgba(74,222,128,0.1);color:var(--gr);}
.meas-chg.neg{background:rgba(248,113,113,0.1);color:var(--rd);}
.meas-chg.neu{background:rgba(255,255,255,0.05);color:var(--mu);}
.meas-dt{font-size:9px;color:var(--mu);font-family:'DM Mono',monospace;margin-top:3px;}
.body-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:10px 16px;}
.bc{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:11px;}
.bc-l{font-size:9px;color:var(--mu);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:3px;}
.bc-v{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;}
.bc-c{font-size:10px;margin-top:2px;}
.bc-c.pos{color:var(--gr);}
.bc-c.neg{color:var(--rd);}
.hist-row{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;border-bottom:1px solid rgba(255,255,255,0.04);}
.hist-dt{font-family:'DM Mono',monospace;font-size:11px;color:var(--mu);}
.hist-w{font-size:13px;font-weight:600;}

/* PLANS */
.plan-card{margin:6px 16px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--ra);overflow:hidden;}
.plan-hdr{padding:12px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:flex-start;justify-content:space-between;}
.plan-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;line-height:1.2;}
.plan-meta{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace;margin-top:3px;}
.plan-badge{font-size:10px;padding:3px 8px;border-radius:99px;font-weight:600;flex-shrink:0;margin-left:8px;}
.plan-badge.aktywny{background:rgba(74,222,128,0.12);color:var(--gr);}
.plan-badge.archiwum{background:rgba(255,255,255,0.06);color:var(--mu);}
.plan-days{padding:10px 14px;}
.plan-day{margin-bottom:8px;}
.plan-day-title{font-size:11px;font-weight:700;color:var(--ac);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
.plan-ex{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.03);}
.plan-ex:last-child{border-bottom:none;}
.plan-ex-name{flex:1;font-size:12px;}
.plan-ex-sets{font-family:'DM Mono',monospace;font-size:11px;color:var(--ac);}
.plan-ex-note{font-size:10px;color:var(--mu);font-style:italic;}
.plan-note{padding:8px 14px 12px;font-size:12px;color:var(--mu);line-height:1.5;font-style:italic;border-top:1px solid var(--b1);}

/* PROFILE */
.prof-section{padding:14px 16px;border-bottom:1px solid var(--b1);}
.prof-section-title{font-size:10px;font-weight:700;color:var(--mu);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;}
.prof-row{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.prof-row:last-child{border-bottom:none;}
.prof-key{font-size:11px;color:var(--mu);min-width:100px;flex-shrink:0;padding-top:1px;}
.prof-val{font-size:13px;color:var(--tx);font-weight:500;flex:1;line-height:1.5;}
.prof-tag{display:inline-block;background:rgba(248,113,113,0.1);color:var(--rd);border:1px solid rgba(248,113,113,0.25);border-radius:6px;padding:2px 8px;font-size:11px;margin:2px 3px 2px 0;}
.prof-tag.gr{background:rgba(74,222,128,0.1);color:var(--gr);border-color:rgba(74,222,128,0.25);}
.prof-tag.bl{background:rgba(96,165,250,0.1);color:var(--bl);border-color:rgba(96,165,250,0.25);}

/* RANKINGS */
.rank-hdr{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--b1);}
.rank-pos{font-family:'Syne',sans-serif;font-size:34px;font-weight:800;color:var(--ac);}
.rank-row{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.04);gap:11px;}
.rank-row.me{background:rgba(232,48,42,0.05);border-left:2px solid var(--ac);}
.rank-num{font-size:15px;font-weight:900;width:22px;text-align:center;flex-shrink:0;}
.rank-av2{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
.rank-info2{flex:1;min-width:0;}
.rank-name2{font-size:13px;font-weight:600;display:flex;align-items:center;gap:5px;}
.me-tag{font-size:9px;background:var(--ac);color:#fff;padding:1px 5px;border-radius:99px;font-weight:700;}
.rank-meta2{font-size:10px;color:var(--mu);margin-top:1px;}
.rank-pb2{height:3px;background:rgba(255,255,255,0.06);border-radius:99px;margin-top:4px;overflow:hidden;}
.rank-pf2{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--yw),var(--ac));}
.rank-xp2{text-align:right;flex-shrink:0;}
.rank-xpv{font-family:'DM Mono',monospace;font-size:14px;font-weight:700;color:var(--yw);}
.rp-row{display:flex;gap:5px;padding:9px 16px;border-bottom:1px solid var(--b1);}
.rp-btn{padding:5px 11px;border-radius:99px;border:1px solid var(--b2);background:transparent;color:var(--mu);font-size:10px;font-weight:600;cursor:pointer;font-family:'DM Mono',monospace;}
.rp-btn.on{background:var(--ac);border-color:var(--ac);color:#fff;}

/* HABITS */
.h-phase{display:flex;align-items:center;gap:6px;padding:7px 16px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--mu);}
.h-phase::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;}
.h-row{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.04);gap:11px;cursor:pointer;transition:background 0.15s;}
.h-row:active{background:rgba(255,255,255,0.03);}
.h-row.done{background:rgba(74,222,128,0.04);}
.hchk{width:25px;height:25px;border-radius:7px;border:2px solid var(--mu2);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;transition:all 0.2s;}
.hchk.on{background:var(--gr);border-color:var(--gr);color:#000;}
.h-info{flex:1;min-width:0;}
.h-name{font-size:13px;font-weight:500;}
.h-row.done .h-name{color:var(--mu);text-decoration:line-through;}
.h-meta{font-size:10px;color:var(--mu);margin-top:1px;}
.h-xp{font-size:11px;color:var(--yw);font-weight:700;flex-shrink:0;}
.prog-w{padding:0 16px 7px;}
.prog-bg{height:4px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;}
.prog-f{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gr),#22c55e);transition:width 0.4s;}

/* CHALLENGE */
.ch-ban{margin:9px 16px;background:linear-gradient(135deg,rgba(245,158,11,0.09),rgba(232,48,42,0.07));border:1px solid rgba(245,158,11,0.22);border-radius:var(--ra);padding:13px 14px;}
.ch-tag{display:inline-flex;align-items:center;gap:4px;background:rgba(245,158,11,0.18);border-radius:99px;padding:2px 8px;font-size:9px;font-weight:700;color:var(--yw);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;}
.ch-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:3px;}
.ch-desc{font-size:11px;color:var(--mu);margin-bottom:9px;}
.ch-foot{display:flex;align-items:center;justify-content:space-between;}
.ch-xp{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--yw);}
.ch-btn{padding:8px 16px;background:var(--yw);color:#000;border:none;border-radius:8px;font-size:12px;font-weight:800;cursor:pointer;}
.ch-btn.done{background:rgba(74,222,128,0.18);color:var(--gr);border:1px solid rgba(74,222,128,0.3);}
.ch-who{font-size:10px;color:var(--mu);margin-top:6px;}

/* TRAINER CLIENT LIST */
.tc-card{padding:13px 16px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:11px;}
.tc-card.no-act{border-left:3px solid var(--rd);}
.tc-card.warn{border-left:3px solid var(--yw);}
.tc-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;}
.tc-info{flex:1;min-width:0;}
.tc-name{font-size:14px;font-weight:600;}
.tc-meta{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace;margin-top:2px;}
.tc-hbar{height:3px;background:rgba(255,255,255,0.06);border-radius:99px;margin-top:5px;overflow:hidden;}
.tc-hf{height:100%;border-radius:99px;}
.tc-right{text-align:right;flex-shrink:0;}
.tc-xp{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:var(--yw);}
.tc-alert{font-size:10px;padding:2px 7px;border-radius:99px;margin-top:3px;}
.tc-alert.r{background:rgba(248,113,113,0.14);color:var(--rd);}
.tc-alert.y{background:rgba(245,158,11,0.14);color:var(--yw);}

/* TRAINER PLAN BUILDER */
.day-block{background:rgba(255,255,255,0.03);border:1px solid var(--b2);border-radius:10px;padding:12px;margin-bottom:8px;}
.day-title-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.day-title-input{flex:1;background:rgba(255,255,255,0.06);border:1px solid var(--b2);border-radius:7px;padding:7px 10px;color:var(--tx);font-size:12px;font-weight:600;outline:none;}
.day-title-input:focus{border-color:var(--ac);}
.ex-row2{display:flex;gap:5px;margin-bottom:5px;align-items:center;}
.ex-row2 input{background:rgba(255,255,255,0.05);border:1px solid var(--b2);border-radius:6px;padding:7px 9px;color:var(--tx);font-size:12px;outline:none;}
.ex-row2 input:focus{border-color:var(--ac);}
.ex-del{background:none;border:none;color:var(--rd);font-size:15px;cursor:pointer;padding:3px;flex-shrink:0;}
.add-btn{background:none;border:1px dashed var(--b2);color:var(--mu);border-radius:7px;padding:6px 12px;font-size:11px;cursor:pointer;transition:all 0.15s;}
.add-btn:hover{border-color:var(--ac);color:var(--ac);}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:300;display:none;align-items:flex-end;justify-content:center;}
.ov.on{display:flex;}
.modal{background:#0f0f0f;border:1px solid var(--b2);border-radius:var(--ra) var(--ra) 0 0;width:100%;max-width:480px;padding:20px 16px;max-height:88dvh;overflow-y:auto;}
.modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:14px;}
.modal-close{float:right;background:none;border:none;color:var(--mu);font-size:20px;cursor:pointer;line-height:1;}
.btn-p{width:100%;padding:13px;background:var(--ac);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;}
.btn-p:active{opacity:0.85;}
.btn-d{width:100%;padding:12px;background:transparent;color:var(--rd);border:1px solid var(--rd);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;margin-top:7px;}

/* FLASH */

function getLevel(xp){return LEVELS.slice().reverse().find(l=>xp>=l.xp)||LEVELS[0];}
function getLvPct(xp){
  const c=getLevel(xp),i=LEVELS.indexOf(c);
  if(i>=LEVELS.length-1)return{c,n:null,p:100};
  const n=LEVELS[i+1];
  return{c,n,p:Math.round((xp-c.xp)/(n.xp-c.xp)*100)};
}
function getLeague(xp){return LEAGUES.slice().reverse().find(l=>xp>=l.min)||LEAGUES[0];}

  if(LB_P==='weekly')return l.sort((a,b)=>(b.xpWeekly||0)-(a.xpWeekly||0));
  return l.sort((a,b)=>(b.xpTotal||0)-(a.xpTotal||0));
}

function doLogin(){

  const pass=document.getElementById('l-pass').value;
  if(!name||!pass){document.getElementById('l-err').textContent='Podaj imię i hasło.';return;}

    if(name===TRAINER_NAME&&pass===TRAINER_PASS)loginTrainer();
    else document.getElementById('l-err').textContent='Błędne dane trenera.';
    return;

// ══════════════════════════════════════════════════
// LISTENERS
// ══════════════════════════════════════════════════
function startListeners(){
  stopListeners();
  const L=(ref,fn)=>{const cb=DB.ref(ref).on('value',fn);LISTENERS.push({ref,cb});};
  L('Klienci',snap=>{
    CLIENTS={};
    if(snap.exists())snap.forEach(c=>CLIENTS[c.key]={id:c.key,...c.val()});
    if(CU){const u=Object.values(CLIENTS).find(c=>c.id===CU.id);if(u)CU=u;}
    if(ROLE==='client'){if(C_VIEW==='dash')renderDash();if(C_VIEW==='ranking')renderRanking();}
    if(ROLE==='trainer'){renderTrainerClients();fillSelects();}
  });
  L('challenge',snap=>{CHALLENGE=snap.exists()?snap.val():null;if(ROLE==='client'&&(C_VIEW==='habits'||C_VIEW==='dash')){if(C_VIEW==='habits')renderHabits();else renderDash();}});
  L('CustomHabits',snap=>{CUSTOM_H={};if(snap.exists())snap.forEach(h=>CUSTOM_H[h.key]={id:h.key,...h.val()});if(ROLE==='client'&&C_VIEW==='habits')renderHabits();});
  L('Measurements',snap=>{MEASURES={};if(snap.exists())snap.forEach(m=>MEASURES[m.key]={id:m.key,...m.val()});if(ROLE==='client'){if(C_VIEW==='measures')renderMeasures();if(C_VIEW==='dash')renderDash();}});
  L('Plans',snap=>{PLANS={};if(snap.exists())snap.forEach(p=>PLANS[p.key]={id:p.key,...p.val()});if(ROLE==='client'&&C_VIEW==='plans')renderPlans();if(ROLE==='client'&&C_VIEW==='dash')renderDash();});
  L('TrainerMessages',snap=>{MESSAGES={};if(snap.exists())snap.forEach(m=>MESSAGES[m.key]={id:m.key,...m.val()});if(ROLE==='client'&&C_VIEW==='dash')renderDash();});
  L('ClientProfiles',snap=>{PROFILES={};if(snap.exists())snap.forEach(p=>PROFILES[p.key]={id:p.key,...p.val()});if(ROLE==='client'&&C_VIEW==='profile')renderProfile();});
}
function stopListeners(){
  LISTENERS.forEach(({ref,cb})=>DB.ref(ref).off('value',cb));
  LISTENERS=[];
}

function cNav(v){

function buildChart(data,key,label,color){
  const W=320,H=100,pad=28;
  const vals=data.map(d=>d[key]).filter(Boolean);
  if(vals.length<2)return'';
  const chartData=data.filter(d=>d[key]);
  const min=Math.min(...vals)-1,max=Math.max(...vals)+1;
  const xStep=(W-pad*2)/(chartData.length-1);
  const yScale=(H-20)/(max-min);
  const points=chartData.map((d,i)=>({x:pad+i*xStep,y:H-10-(d[key]-min)*yScale,v:d[key],dt:d.date}));
  const pathD='M'+points.map(p=>`${p.x},${p.y}`).join(' L');
  const areaD=pathD+` L${points[points.length-1].x},${H-5} L${points[0].x},${H-5} Z`;
  let svg=`<div class="chart-w"><svg class="chart-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="cg${key}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${areaD}" fill="url(#cg${key})"/>
    <path d="${pathD}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
  points.forEach(p=>{
    svg+=`<circle cx="${p.x}" cy="${p.y}" r="3" fill="${color}"/>`;
    svg+=`<text x="${p.x}" y="${p.y-6}" fill="#555" font-size="9" text-anchor="middle">${p.v}</text>`;
  });
  [0,Math.floor(points.length/2),points.length-1].forEach(i=>{
    if(!points[i])return;
    const d=new Date(chartData[i].date+'T12:00:00');
    svg+=`<text x="${points[i].x}" y="${H}" fill="#444" font-size="9" text-anchor="middle">${d.getDate()}.${d.getMonth()+1}</text>`;
  });
  svg+=`</svg></div>`;
  return svg;
}

        <button class="ch-btn${isDone?' done':''}" onclick="doChallenge()">${isDone?'✅ Zaliczone!':'⚡ Zaliczyłem!'}</button>
      </div>
      <div class="ch-who">${comps.length?'Zaliczyli: '+comps.map(c=>c.name).join(', '):'Bądź pierwszy! 🚀'}</div>
    </div>`;
  }

  let lastPhase=null;
  HABITS.forEach(h=>{
    if(h.phase&&h.phase!==lastPhase){
      html+=`<div class="h-phase" style="color:${h.pc||'var(--mu)'}">${h.phase}</div>`;
      lastPhase=h.phase;
    }
    const checked=!!ck[h.id];
    html+=`<div class="h-row${checked?' done':''}" onclick="toggleH('${h.id}')">
      <div class="hchk${checked?' on':''}">${checked?'✓':''}</div>
      <div class="h-info"><div class="h-name">${h.name}</div><div class="h-meta">${h.meta}</div></div>
      <div class="h-xp">+${h.xp}</div>
    </div>`;
  });

  const customH=Object.values(CUSTOM_H).sort((a,b)=>a.level-b.level);
  if(customH.length){
    html+=`<div class="h-phase" style="color:var(--yw)">⭐ Dodatkowe od trenera</div>`;
    customH.forEach(h=>{
      const hid='ch_'+h.id,checked=!!ck[hid];
      html+=`<div class="h-row${checked?' done':''}" onclick="toggleCH('${h.id}')">
        <div class="hchk${checked?' on':''}">${checked?'✓':''}</div>
        <div class="h-info"><div class="h-name">${h.emoji||'⭐'} ${h.name}</div><div class="h-meta">${h.desc||h.cat||''}</div></div>
        <div class="h-xp" style="color:var(--yw)">+${h.xp}</div>
      </div>`;
    });
  }

  html+=`<div style="padding:14px 16px;">
    <button onclick="shareH()" style="width:100%;padding:11px;background:#25D366;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;">📤 Podziel się wynikiem na WhatsApp</button>
  </div><div style="height:16px"></div>`;

  document.getElementById('c-view').innerHTML=html;
}

function toggleH(id){
  if(!CU)return;
  const h=HABITS.find(x=>x.id===id);if(!h)return;
  const u=CU,ck={...(u.checked||{})};
  let xpd=u.xpToday||0,xpt=u.xpTotal||0,xpw=u.xpWeekly||0;
  if(ck[id]){delete ck[id];xpd=Math.max(0,xpd-h.xp);xpt=Math.max(0,xpt-h.xp);xpw=Math.max(0,xpw-h.xp);}
  else{ck[id]=true;xpd+=h.xp;xpt+=h.xp;xpw+=h.xp;flash('+'+h.xp+' XP ⚡');}
  DB.ref('Klienci/'+u.id).update({checked:ck,xpToday:xpd,xpTotal:xpt,xpWeekly:xpw});
  if(Object.keys(ck).filter(k=>!k.startsWith('ch_')).length===HABITS.length)setTimeout(()=>flash('🏆 PERFECT DAY! Wszystkie nawyki!'),300);
}
function toggleCH(id){
  if(!CU)return;
  const h=CUSTOM_H[id];if(!h)return;
  const u=CU,ck={...(u.checked||{})},hid='ch_'+id;
  let xpd=u.xpToday||0,xpt=u.xpTotal||0,xpw=u.xpWeekly||0;
  if(ck[hid]){delete ck[hid];xpd=Math.max(0,xpd-h.xp);xpt=Math.max(0,xpt-h.xp);xpw=Math.max(0,xpw-h.xp);}
  else{ck[hid]=true;xpd+=h.xp;xpt+=h.xp;xpw+=h.xp;flash('+'+h.xp+' XP ⚡');}
  DB.ref('Klienci/'+u.id).update({checked:ck,xpToday:xpd,xpTotal:xpt,xpWeekly:xpw});
}
function doChallenge(){
  if(!CU||!CHALLENGE)return;
  if(CLIENTS[CU.id]?.challengeDone){flash('Już zaliczone! ✅');return;}
  const xp=CHALLENGE.xp||50;
  DB.ref('Klienci/'+CU.id).update({challengeDone:true,xpToday:(CU.xpToday||0)+xp,xpTotal:(CU.xpTotal||0)+xp,xpWeekly:(CU.xpWeekly||0)+xp});
  DB.ref('challenge/completions').push({name:CU.name,color:CU.color});
  flash('⚡ +'+xp+' XP Wyzwanie zaliczone!');
}
function shareH(){
  if(!CU)return;
  const u=CU,s=sortClients(),r=s.findIndex(c=>c.id===u.id)+1;
  const done=HABITS.filter(h=>(u.checked||{})[h.id]).length;
  const league=getLeague(u.xpTotal||0);
  const msg=`💪 ${u.name} — postęp dnia!\n\n✅ Nawyki: ${done}/${HABITS.length}\n⚡ XP dziś: ${u.xpToday||0}\n🏅 XP łącznie: ${u.xpTotal||0}\n🏆 Ranking: #${r}/${s.length}\n🔥 Passa: ${u.streak||0} dni\n${league.icon} Liga: ${league.name}\n\nPROGRESS Nawyki · Wrocław 💪`;
  try{navigator.clipboard.writeText(msg);}catch(e){}
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
}

function renderRanking(){
  if(!CU)return;
  const s=sortClients(),mi=s.findIndex(c=>c.id===CU.id);
  const medals=['🥇','🥈','🥉'];
  const max=Math.max(...s.map(c=>LB_P==='streak'?(c.streak||0):LB_P==='today'?(c.xpToday||0):LB_P==='weekly'?(c.xpWeekly||0):(c.xpTotal||0)),1);

  let html=`<div class="rank-hdr">
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="rank-pos">#${mi+1}</div>
      <div><div style="font-size:14px;font-weight:600">${CU.name}</div><div style="font-size:10px;color:var(--mu)">z ${s.length} osób</div></div>
    </div>
    <div style="text-align:right">
      <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--yw)">${CU.xpTotal||0}</div>
      <div style="font-size:10px;color:var(--mu)">XP łącznie</div>
    </div>
  </div>
  <div class="rp-row">
    <button class="rp-btn ${LB_P==='total'?'on':''}" onclick="setLbP('total')">Total</button>
    <button class="rp-btn ${LB_P==='weekly'?'on':''}" onclick="setLbP('weekly')">Tydzień</button>
    <button class="rp-btn ${LB_P==='streak'?'on':''}" onclick="setLbP('streak')">🔥 Passa</button>
    <button class="rp-btn ${LB_P==='today'?'on':''}" onclick="setLbP('today')">Dziś</button>
  </div>`;

  s.forEach((cl,i)=>{
    const isMe=cl.id===CU.id;
    const val=LB_P==='streak'?(cl.streak||0):LB_P==='today'?(cl.xpToday||0):LB_P==='weekly'?(cl.xpWeekly||0):(cl.xpTotal||0);
    const pct=Math.round(val/max*100);
    const done=HABITS.filter(h=>(cl.checked||{})[h.id]).length;
    const lg=getLeague(cl.xpTotal||0);
    html+=`<div class="rank-row${isMe?' me':''}">
      <div class="rank-num">${i<3?medals[i]:i+1}</div>
      <div class="rank-av2" style="background:${cl.color||'#888'}">${cl.name[0]}</div>
      <div class="rank-info2">
        <div class="rank-name2">${esc(cl.name)}${isMe?'<span class="me-tag">TY</span>':''} ${lg.icon}</div>
        <div class="rank-meta2">Dziś: ${done}/${HABITS.length} · 🔥 ${cl.streak||0} dni</div>
        <div class="rank-pb2"><div class="rank-pf2" style="width:${pct}%"></div></div>
      </div>
      <div class="rank-xp2"><div class="rank-xpv">${val}</div><div style="font-size:9px;color:var(--mu)">${LB_P==='streak'?'dni':'XP'}</div></div>
    </div>`;
  });
  html+=`<div style="height:18px"></div>`;
  document.getElementById('c-view').innerHTML=html;
}
function setLbP(p){LB_P=p;renderRanking();}

// ── SAVE PROFILE ───────────────────────────────────────────
function saveProfile(){
  const cid=document.getElementById('tp-client').value;
  if(!cid){flash('⚠️ Wybierz klienta!');return;}
  const data={clientId:cid,updatedAt:Date.now(),
    age:document.getElementById('tp-age').value,
    height:document.getElementById('tp-height').value,
    goal:document.getElementById('tp-goal').value,
    level:document.getElementById('tp-level').value,
    days:document.getElementById('tp-days').value,
    injuries:document.getElementById('tp-injuries').value,
    equipment:document.getElementById('tp-equipment').value,
    prefs:document.getElementById('tp-prefs').value,
    notes:document.getElementById('tp-notes').value,
  };
  // Check if profile exists
  const existing=Object.values(PROFILES).find(p=>p.clientId===cid);
  const ref=existing?DB.ref('ClientProfiles/'+existing.id):DB.ref('ClientProfiles').push();
  (existing?ref.update(data):ref.set(data)).then(()=>flash('✅ Dane klienta zapisane!'));
}

// ── SAVE MEASUREMENT ───────────────────────────────────────
function saveMeasurement(){
  const cid=document.getElementById('tm-client').value;
  const date=document.getElementById('tm-date').value;
  if(!cid||!date){flash('⚠️ Wybierz klienta i datę!');return;}
  const data={clientId:cid,date,addedAt:Date.now()};
  const fields=['weight','fat','chest','waist','hips','arm','thigh','calf'];
  fields.forEach(f=>{
    const v=parseFloat(document.getElementById('tm-'+f).value);
    if(!isNaN(v)&&v>0)data[f]=v;
  });
  if(Object.keys(data).length<=3){flash('⚠️ Wpisz przynajmniej jeden pomiar!');return;}
  DB.ref('Measurements').push(data).then(()=>{
    flash('📏 Pomiar zapisany!');
    fields.forEach(f=>{const el=document.getElementById('tm-'+f);if(el)el.value='';});
  });
}

function addDayBlock(){
  const b=document.getElementById('days-builder');
  const div=document.createElement('div');
  div.className='day-block';
  div.dataset.day=DAY_COUNT;
  div.innerHTML=`<div class="day-title-row">
    <input class="day-title-input" placeholder="Dzień ${DAY_COUNT+1} — np. Push (klatka, barki, triceps)" id="day-title-${DAY_COUNT}">
    <button class="ex-del" onclick="this.closest('.day-block').remove()" style="font-size:18px">✕</button>
  </div>
  <div id="day-ex-${DAY_COUNT}">
    <div class="ex-row2">
      <input placeholder="Ćwiczenie" style="flex:2" id="d${DAY_COUNT}e0-name">
      <input placeholder="Serie x Powtórzenia" style="flex:1.5" id="d${DAY_COUNT}e0-sets">
      <input placeholder="Wskazówka" style="flex:1.5" id="d${DAY_COUNT}e0-note">
      <button class="ex-del" onclick="this.parentElement.remove()">✕</button>
    </div>
  </div>
  <button class="add-btn" onclick="addExToDay(${DAY_COUNT})" style="margin-top:6px">+ Ćwiczenie</button>`;

}
let exCounts={};
function addExToDay(d){
  const cont=document.getElementById('day-ex-'+d);if(!cont)return;
  if(!exCounts[d])exCounts[d]=1;const e=exCounts[d]++;
  const row=document.createElement('div');row.className='ex-row2';
  row.innerHTML=`<input placeholder="Ćwiczenie" style="flex:2" id="d${d}e${e}-name"><input placeholder="Serie x Powtórzenia" style="flex:1.5" id="d${d}e${e}-sets"><input placeholder="Wskazówka" style="flex:1.5" id="d${d}e${e}-note"><button class="ex-del" onclick="this.parentElement.remove()">✕</button>`;
  cont.appendChild(row);
}

function savePlan(){
  const cid=document.getElementById('tpl-client').value;
  const name=document.getElementById('tpl-name').value.trim();
  if(!cid||!name){flash('⚠️ Wybierz klienta i podaj nazwę!');return;}
  const days=[];
  document.querySelectorAll('.day-block').forEach(block=>{
    const d=block.dataset.day;
    const title=block.querySelector('.day-title-input')?.value.trim()||('Dzień '+(days.length+1));
    const exercises=[];
    block.querySelectorAll('.ex-row2').forEach(row=>{
      const inputs=row.querySelectorAll('input');
      const n=inputs[0]?.value.trim();
      if(n)exercises.push({name:n,sets:inputs[1]?.value.trim()||'',note:inputs[2]?.value.trim()||''});
    });
    if(exercises.length)days.push({title,exercises});
  });
  const data={
    clientId:cid,name,startDate:document.getElementById('tpl-start').value||today(),
    status:document.getElementById('tpl-status').value,
    desc:document.getElementById('tpl-desc').value.trim(),
    trainerNote:'',days,createdAt:Date.now(),
  };
  DB.ref('Plans').push(data).then(()=>{
    flash('💾 Plan zapisany!');
    document.getElementById('tpl-name').value='';
    document.getElementById('tpl-desc').value='';
    document.getElementById('days-builder').innerHTML='';
    DAY_COUNT=0;exCounts={};
  });
}
